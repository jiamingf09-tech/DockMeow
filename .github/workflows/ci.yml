name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       arch: arm64  }
          - { os: windows-latest, arch: x86_64 }
          - { os: ubuntu-22.04,   arch: x86_64 }
    runs-on: ${{ matrix.os }}
    # vina source compilation via MSVC is not supported; Windows is informational.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # ── macOS arm64: vina has no PyPI wheel; install from conda-forge ─────
      # Keep subsequent steps on the Miniforge environment so pip sees the
      # conda-installed vina package instead of trying to build the PyPI sdist.
      - name: Install vina via conda (macOS arm64)
        if: matrix.os == 'macos-14' && matrix.arch == 'arm64'
        shell: bash
        run: |
          curl -fsSL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-MacOSX-arm64.sh \
            -o /tmp/miniforge.sh
          bash /tmp/miniforge.sh -b -p "${HOME}/miniforge3"
          source "${HOME}/miniforge3/etc/profile.d/conda.sh"
          conda create -y -n dockmeow python=3.11 pip
          conda activate dockmeow
          conda install -y -c conda-forge vina boost-cpp scipy

          python -m pip install --upgrade pip
          python -m pip show vina
          echo "${HOME}/miniforge3/envs/dockmeow/bin" >> "${GITHUB_PATH}"
          echo "CONDA_PREFIX=${HOME}/miniforge3/envs/dockmeow" >> "${GITHUB_ENV}"
          echo "DYLD_LIBRARY_PATH=${HOME}/miniforge3/envs/dockmeow/lib" >> "${GITHUB_ENV}"

      # ── Linux: PySide6 needs libEGL on headless runners ──────────────────
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libegl1

      # ── Windows: vina pip sdist requires MSVC + Boost which CI lacks.
      # Create a stub dist-info so pip treats vina as satisfied and the rest
      # of the deps + editable install succeed.
      - name: Pre-install vina or stub it (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m pip install vina || python - << 'PYEOF'
          import pathlib, site
          sp = pathlib.Path(site.getsitepackages()[0])
          di = sp / "vina-1.2.7.dist-info"
          di.mkdir(exist_ok=True)
          (di / "METADATA").write_text("Metadata-Version: 2.1\nName: vina\nVersion: 1.2.7\n")
          (di / "RECORD").write_text("")
          (di / "INSTALLER").write_text("pip")
          print(f"Stub vina dist-info created at {di}")
          PYEOF

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src/

      - name: Run tests
        run: python -m pytest --tb=short --cov=dockmeow --cov-report=term-missing

      # ── fpocket smoke test (Linux + macOS only; no Windows binary) ────────
      - name: fpocket smoke test
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - << 'PYEOF'
          import subprocess, sys, tempfile, shutil
          from pathlib import Path

          src_root = Path("src")
          sys.path.insert(0, str(src_root))
          from dockmeow.utils.paths import fpocket_binary

          binary = fpocket_binary()
          if not binary.exists():
              print(f"SKIP: fpocket binary not found at {binary}")
              sys.exit(0)

          # Use a minimal synthetic PDB so the test has no dependency on
          # the examples/ directory (removed in open-source cleanup).
          _minimal_pdb = (
              "ATOM      1  CA  ALA A   1       1.000   1.000   1.000  1.00  0.00           C\n"
              "ATOM      2  CA  ALA A   2       2.000   2.000   2.000  1.00  0.00           C\n"
              "ATOM      3  CA  ALA A   3       3.000   3.000   3.000  1.00  0.00           C\n"
              "END\n"
          )
          with tempfile.TemporaryDirectory() as tmpdir:
              local_pdb = Path(tmpdir) / "smoke.pdb"
              local_pdb.write_text(_minimal_pdb)
              try:
                  result = subprocess.run(
                      [str(binary), "-f", str(local_pdb)],
                      capture_output=True, text=True, cwd=tmpdir, timeout=60,
                  )
              except OSError as exc:
                  print(f"SKIP: fpocket binary cannot execute: {exc}")
                  sys.exit(0)
              if result.returncode != 0:
                  print("FAIL: fpocket non-zero exit:", result.stderr[:300])
                  sys.exit(1)
              out_dir = Path(tmpdir) / f"{local_pdb.stem}_out"
              pockets_dir = out_dir / "pockets"
              atm_files = sorted(pockets_dir.glob("pocket*_atm.pdb")) if pockets_dir.exists() else []
              info_file = out_dir / f"{local_pdb.stem}_info.txt"
              if not info_file.exists() or not atm_files:
                  print(f"FAIL: expected _info.txt and pocket*_atm.pdb, found: {list(out_dir.iterdir())[:5]}")
                  sys.exit(1)
              print(f"PASS: fpocket found {len(atm_files)} pockets, _info.txt present")
          PYEOF
