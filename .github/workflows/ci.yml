name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,        arch: arm64   }
          - { os: windows-latest,  arch: x86_64  }
          - { os: ubuntu-22.04,    arch: x86_64  }
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      # Install vina from conda-forge (pre-built binary for all platforms).
      # pip will see it as already satisfied and skip source compilation,
      # avoiding the SWIG + Boost build issues on macOS arm64 and Windows.
      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: latest
          environment-name: dockmeow-ci
          create-args: >-
            python=3.11
            vina
          condarc: |
            channels:
              - conda-forge

      # PySide6 requires libEGL at import time on headless Linux runners.
      - name: Install Qt system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libegl1

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ --tb=short --cov=dockmeow --cov-report=term-missing
        # Stage 1: core tests only; expand in later stages

      # ── fpocket smoke test (Linux + macOS only; no Windows binary) ──────────
      - name: fpocket smoke test
        if: runner.os != 'Windows'
        run: |
          python - << 'PYEOF'
          import subprocess, sys, tempfile, shutil
          from pathlib import Path

          src_root = Path("src")
          sys.path.insert(0, str(src_root))
          from dockmeow.utils.paths import fpocket_binary

          binary = fpocket_binary()
          if not binary.exists():
              print(f"SKIP: fpocket binary not found at {binary}")
              sys.exit(0)

          pdb = Path("examples/1AKE_with_ATP.pdb")
          with tempfile.TemporaryDirectory() as tmpdir:
              local_pdb = Path(tmpdir) / pdb.name
              shutil.copy2(pdb, local_pdb)
              result = subprocess.run(
                  [str(binary), "-f", str(local_pdb)],
                  capture_output=True, text=True, cwd=tmpdir, timeout=60,
              )
              if result.returncode != 0:
                  print("FAIL: fpocket non-zero exit:", result.stderr[:300])
                  sys.exit(1)
              out_dir = Path(tmpdir) / f"{local_pdb.stem}_out"
              pockets_dir = out_dir / "pockets"
              atm_files = sorted(pockets_dir.glob("pocket*_atm.pdb")) if pockets_dir.exists() else []
              info_file = out_dir / f"{local_pdb.stem}_info.txt"
              if not info_file.exists() or not atm_files:
                  print(f"FAIL: expected _info.txt and pocket*_atm.pdb, found: {list(out_dir.iterdir())[:5]}")
                  sys.exit(1)
              print(f"PASS: fpocket found {len(atm_files)} pockets, _info.txt present")
          PYEOF
